<h2 mat-dialog-title>Markdown Keyboard Shortcuts</h2>

<mat-dialog-content>
  <table class="shortcuts-table">
    <thead>
      <tr>
        <th>Action</th>
        <th>Shortcut</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td class="action-name">Bold</td>
        <td class="shortcut-cell">
          <span class="shortcut-key">Ctrl/Cmd</span> + <span class="shortcut-key">B</span>
        </td>
      </tr>
      <tr>
        <td class="action-name">Italic</td>
        <td class="shortcut-cell">
          <span class="shortcut-key">Ctrl/Cmd</span> + <span class="shortcut-key">I</span>
        </td>
      </tr>
      <tr>
        <td class="action-name">Insert Link</td>
        <td class="shortcut-cell">
          <span class="shortcut-key">Ctrl/Cmd</span> + <span class="shortcut-key">K</span>
        </td>
      </tr>
      <tr>
        <td class="action-name">Strikethrough</td>
        <td class="shortcut-cell">
          <span class="shortcut-key">Ctrl/Cmd</span> +
          <span class="shortcut-key">Shift</span> + <span class="shortcut-key">X</span>
        </td>
      </tr>
      <tr>
        <td class="action-name">Unordered List</td>
        <td class="shortcut-cell">
          <span class="shortcut-key">Ctrl/Cmd</span> +
          <span class="shortcut-key">Shift</span> + <span class="shortcut-key">8</span>
        </td>
      </tr>
      <tr>
        <td class="action-name">Ordered List</td>
        <td class="shortcut-cell">
          <span class="shortcut-key">Ctrl/Cmd</span> +
          <span class="shortcut-key">Shift</span> + <span class="shortcut-key">7</span>
        </td>
      </tr>
      <tr>
        <td class="action-name">Blockquote</td>
        <td class="shortcut-cell">
          <span class="shortcut-key">Ctrl/Cmd</span> +
          <span class="shortcut-key">Shift</span> + <span class="shortcut-key">9</span>
        </td>
      </tr>
      <tr>
        <td class="action-name">Inline Code</td>
        <td class="shortcut-cell">
          <span class="shortcut-key">Ctrl/Cmd</span> + <span class="shortcut-key">E</span>
        </td>
      </tr>
    </tbody>
  </table>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button
    mat-button
    mat-dialog-close
  >
    {{ T.G.CLOSE | translate }}
  </button>
</mat-dialog-actions>
