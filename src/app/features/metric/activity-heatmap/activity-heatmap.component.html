<section class="activity-heatmap">
  <div class="heatmap-header">
    <h1 class="heatmap-title">{{ T.F.METRIC.CMP.ACTIVITY_HEATMAP | translate }}</h1>
    <div class="heatmap-header__actions">
      @if (heatmapData()) {
        <button
          mat-icon-button
          (click)="shareHeatmap()"
          [disabled]="isSharing()"
          [matTooltip]="'Share Heatmap' | translate"
        >
          @if (isSharing()) {
            <mat-icon>hourglass_empty</mat-icon>
          } @else {
            <mat-icon>share</mat-icon>
          }
        </button>
      }
    </div>
  </div>

  @if (heatmapData(); as data) {
    <heatmap-switcher
      [data]="data"
      [dayMap]="data.dayMap"
      [rangeStart]="data.rangeStart"
      [rangeEnd]="data.rangeEnd"
      legendMode="intensity"
      persistKey="metrics"
      [navLabel]="selectedYear().toString()"
      [canNavPrev]="canPrevYear()"
      [canNavNext]="canNextYear()"
      (navPrev)="prevYear()"
      (navNext)="nextYear()"
    />
  } @else {
    <p>{{ T.F.METRIC.CMP.NO_ADDITIONAL_DATA_YET | translate }}</p>
  }
</section>
