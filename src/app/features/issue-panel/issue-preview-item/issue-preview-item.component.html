<button
  mat-icon-button
  color=""
  (click)="addIssue.emit(itemData())"
>
  <mat-icon>add</mat-icon>
</button>

<div class="title">{{ customTitleStr() || itemData().title }}</div>

@if (itemData().issueType !== ICAL_TYPE) {
  <button
    class="open-issue"
    mat-icon-button
    (click)="openIssue()"
  >
    <mat-icon>open_in_new</mat-icon>
  </button>
} @else if ($any(itemData().issueData)?.url) {
  <a
    class="open-issue"
    mat-icon-button
    [href]="$any(itemData().issueData).url"
    target="_blank"
    rel="noopener noreferrer"
    title="Open in calendar"
  >
    <mat-icon>open_in_new</mat-icon>
  </a>
}
