<mat-icon class="default">{{ calendarEvent().icon || 'event' }}</mat-icon>
<mat-icon class="add">add</mat-icon>
<div class="title">
  {{ calendarEvent().title }}
  <!--   {{event.start|date:'HH:mm'}} – {{(event.start + event.duration)|date:'HH:mm'}}-->
</div>
@if (calendarEvent().url) {
  <a
    class="calendar-link"
    [href]="calendarEvent().url"
    target="_blank"
    rel="noopener noreferrer"
    title="Open in calendar"
    (click)="$event.stopPropagation()"
  >
    <mat-icon inline="true">open_in_new</mat-icon>
  </a>
}
<div class="planner-time-remaining-shared">
  {{ calendarEvent().duration | msToString }}
</div>
