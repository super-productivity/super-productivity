<div class="rfp">
  @if (label()) {
    <span class="rfp-lbl">{{ label() }}</span>
  }
  <div class="rfp-chips">
    @for (o of visiblePresets(); track o.value) {
      <button
        type="button"
        class="rfp-chip"
        [class.active]="o.value === value()"
        (click)="selected.emit(o.value)"
      >
        {{ o.label }}
      </button>
    }

    @if (canToggle()) {
      <button
        type="button"
        class="rfp-chip rfp-chip--more"
        (click)="toggleExpanded()"
      >
        {{
          (isExpanded()
            ? T.F.TASK_REPEAT.F.QUICK_SETTING_FEWER
            : T.F.TASK_REPEAT.F.QUICK_SETTING_MORE
          ) | translate
        }}
      </button>
    }

    @if (customOption(); as c) {
      <button
        type="button"
        class="rfp-chip rfp-chip--custom"
        [class.active]="c.value === value()"
        (click)="selected.emit(c.value)"
      >
        {{ c.label }}
      </button>
    }
  </div>
</div>
