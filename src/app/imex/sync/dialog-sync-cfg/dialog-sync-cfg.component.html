<div class="dialog-title-row">
  <h1 mat-dialog-title>{{ T.F.SYNC.D_INITIAL_CFG.TITLE | translate }}</h1>
  @if (showAdvanced()) {
    <button
      [matMenuTriggerFor]="advancedMenu"
      mat-icon-button
      type="button"
    >
      <mat-icon>more_vert</mat-icon>
    </button>
  }
</div>

<mat-menu #advancedMenu="matMenu">
  <ng-template matMenuContent>
    @if (canRestore()) {
      <button
        (click)="restoreFromHistory()"
        mat-menu-item
        type="button"
      >
        <mat-icon>history</mat-icon>
        {{ T.F.SYNC.BTN_RESTORE_FROM_HISTORY | translate }}
      </button>
    }
    <button
      (click)="forceOverwrite()"
      class="advanced-menu__danger"
      mat-menu-item
      type="button"
    >
      <mat-icon>cloud_upload</mat-icon>
      {{ T.F.SYNC.S.BTN_FORCE_OVERWRITE | translate }}
    </button>
  </ng-template>
</mat-menu>

<mat-dialog-content>
  @if (_tmpUpdatedCfg) {
    <form [formGroup]="form">
      <formly-form
        (modelChange)="updateTmpCfg($event)"
        [fields]="fields()"
        [form]="form"
        [model]="_tmpUpdatedCfg"
      >
      </formly-form>
    </form>

    @if (canReauth()) {
      <div class="reauth-row">
        <button
          (click)="reauth()"
          color="primary"
          mat-stroked-button
          type="button"
        >
          <mat-icon>refresh</mat-icon>
          {{ T.F.SYNC.FORM.DROPBOX.BTN_REAUTHENTICATE | translate }}
        </button>
      </div>
    }
  }
</mat-dialog-content>

<mat-dialog-actions align="end">
  <div class="wrap-buttons">
    <button
      (click)="close()"
      color="primary"
      mat-button
    >
      {{ T.G.CANCEL | translate }}
    </button>
    <button
      [disabled]="!form.valid"
      (click)="save()"
      color="primary"
      mat-stroked-button
    >
      <mat-icon>save</mat-icon>
      {{
        (this.isWasEnabled() ? T.G.SAVE : T.F.SYNC.D_INITIAL_CFG.SAVE_AND_ENABLE)
          | translate
      }}
    </button>
  </div>
</mat-dialog-actions>
