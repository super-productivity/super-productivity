<h1 mat-dialog-title>{{ T.F.SYNC.D_INITIAL_CFG.TITLE | translate }}</h1>

<mat-dialog-content>
  @if (_tmpUpdatedCfg) {
    <form [formGroup]="form">
      <formly-form
        (modelChange)="updateTmpCfg($event)"
        [fields]="fields()"
        [form]="form"
        [model]="_tmpUpdatedCfg"
      >
      </formly-form>
    </form>

    @if (canReauth()) {
      <div class="reauth-row">
        <button
          (click)="reauth()"
          color="primary"
          mat-stroked-button
          type="button"
        >
          <mat-icon>refresh</mat-icon>
          {{ T.F.SYNC.FORM.DROPBOX.BTN_REAUTHENTICATE | translate }}
        </button>
      </div>
    }
  }
</mat-dialog-content>

<mat-dialog-actions align="end">
  <div class="wrap-buttons">
    <button
      (click)="close()"
      mat-button
    >
      {{ T.G.CANCEL | translate }}
    </button>
    <button
      [disabled]="!form.valid"
      (click)="save()"
      color="primary"
      mat-stroked-button
    >
      <mat-icon>save</mat-icon>
      {{
        (this.isWasEnabled() ? T.G.SAVE : T.F.SYNC.D_INITIAL_CFG.SAVE_AND_ENABLE)
          | translate
      }}
    </button>
  </div>
</mat-dialog-actions>
