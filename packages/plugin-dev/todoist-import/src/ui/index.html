<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Todoist Import</title>
    <style>
      body {
        max-width: 640px;
        margin: 0 auto;
        padding: 16px;
      }
      .muted {
        opacity: 0.7;
        font-size: 0.9em;
      }
      .warn {
        color: var(--c-warning, #b26a00);
        font-size: 0.9em;
      }
      .error {
        color: var(--c-error, #c62828);
      }
      ul {
        padding-left: 20px;
      }
      li {
        margin: 4px 0;
      }
      label {
        display: block;
        margin: 6px 0;
      }
      input[type='password'] {
        width: 100%;
        box-sizing: border-box;
        margin: 8px 0;
      }
      .actions {
        margin-top: 16px;
        display: flex;
        gap: 8px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <!-- BUILD:SCRIPT -->
  </body>
</html>
